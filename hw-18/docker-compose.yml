version: '3.8'

services:
  db:
    image: postgres:17
    container_name: yoyo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data: