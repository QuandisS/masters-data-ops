replicaCount: 1

image:
  repository: nginx
  tag: 1.21-alpine
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 64Mi
    cpu: 100m
  limits:
    memory: 128Mi
    cpu: 200m

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  hosts:
    - host: nginx.local
      paths:
        - path: /
          pathType: Prefix